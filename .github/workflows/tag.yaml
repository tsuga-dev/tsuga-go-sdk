name: Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create_tag_release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        uses: ./.github/actions/get-latest-tag
        id: get-latest-tag
        with:
          initial_version: v1.0.0

      - name: Bump semver
        uses: ./.github/actions/bump-semver
        id: bump-semver
        with:
          current_version: ${{ steps.get-latest-tag.outputs.tag }}
          level: minor

      - name: Push tag
        uses: ./.github/actions/push-tag
        id: push-tag
        with:
          tag: ${{ steps.bump-semver.outputs.new_version }}
          message: "${{ steps.bump-semver.outputs.new_version }}: ${{ github.event.head_commit.message }}"
