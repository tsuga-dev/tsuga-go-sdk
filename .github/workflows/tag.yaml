name: Tag and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag_and_release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        uses: ./.github/actions/get-latest-tag
        id: get-latest-tag
        with:
          initial_version: v1.0.0

      - name: Bump semver
        uses: ./.github/actions/bump-semver
        id: bump-semver
        with:
          current_version: ${{ steps.get-latest-tag.outputs.tag }}
          level: minor

      - name: Dry-run summary
        if: github.event_name == 'pull_request'
        run: |
          echo "## 🧪 Dry-run Mode (PR)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This is a pull request, so no tags or releases will be created." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What would happen on merge to main:" >> $GITHUB_STEP_SUMMARY
          echo "- **Current tag:** \`${{ steps.get-latest-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **New tag:** \`${{ steps.bump-semver.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag message:** ${{ steps.bump-semver.outputs.new_version }}: ${{ github.event.pull_request.title }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Action:** Create GitHub release with the new tag" >> $GITHUB_STEP_SUMMARY

      - name: Push tag
        if: github.event_name == 'push'
        uses: ./.github/actions/push-tag
        id: push-tag
        with:
          tag: ${{ steps.bump-semver.outputs.new_version }}
          message: "${{ steps.bump-semver.outputs.new_version }}: ${{ github.event.head_commit.message }}"

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump-semver.outputs.new_version }}
          name: ${{ steps.bump-semver.outputs.new_version }}
          body: |
            ## Release
            
            ${{ steps.bump-semver.outputs.new_version }}: ${{ github.event.head_commit.message }}
          prerelease: false
          draft: false

      - name: Success summary
        if: github.event_name == 'push'
        run: |
          echo "## ✅ Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ steps.bump-semver.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Release:** [View on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ steps.bump-semver.outputs.new_version }})" >> $GITHUB_STEP_SUMMARY
