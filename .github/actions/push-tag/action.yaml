name: Push Tag
description: Create and push a Git tag with an optional message
inputs:
  tag:
    description: The tag name to create and push
    required: true
  message:
    description: Optional tag message (creates annotated tag if provided)
    required: false
    default: ""
  sha:
    description: The commit SHA to tag (defaults to HEAD)
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Push tag
      shell: bash
      run: |
        set -e
        
        tag="${{ inputs.tag }}"
        message="${{ inputs.message }}"
        sha="${{ inputs.sha }}"
        
        if [[ -z "${tag}" ]]; then
          echo "::error::Tag name is required"
          exit 1
        fi
        
        # Configure git
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Add safe directory
        git config --global --add safe.directory "${GITHUB_WORKSPACE}" || true
        
        # Determine target commit
        target="${sha}"
        if [[ -z "${target}" ]]; then
          target="HEAD"
        fi
        
        # Create tag
        if [[ -n "${message}" ]]; then
          # Create annotated tag with message
          echo "Creating annotated tag ${tag} with message"
          git tag -a "${tag}" ${target} -m "${message}"
        else
          # Create lightweight tag
          echo "Creating lightweight tag ${tag}"
          git tag "${tag}" ${target}
        fi
        
        # Push tag
        echo "Pushing tag ${tag} to origin"
        git push origin "${tag}"
        
        echo "::notice::Successfully created and pushed tag ${tag}"
