name: Push Tag
description: Create and push a Git tag with an optional message
inputs:
  tag:
    description: The tag name to create and push
    required: true
  message:
    description: Optional tag message (creates annotated tag if provided)
    required: false
    default: ""
  sha:
    description: The commit SHA to tag (defaults to HEAD)
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Push tag
      shell: bash
      env:
        TAG_NAME: ${{ inputs.tag }}
        TAG_MESSAGE: ${{ inputs.message }}
        TAG_SHA: ${{ inputs.sha }}
      run: |
        set -e
        
        tag="${TAG_NAME}"
        sha="${TAG_SHA}"
        
        if [[ -z "${tag}" ]]; then
          echo "::error::Tag name is required"
          exit 1
        fi
        
        # Configure git
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Add safe directory
        git config --global --add safe.directory "${GITHUB_WORKSPACE}" || true
        
        # Determine target commit
        target="${sha}"
        if [[ -z "${target}" ]]; then
          target="HEAD"
        fi
        
        # Fetch tags to check if tag already exists
        git fetch --tags origin || true
        
        # Check if tag already exists on remote
        if git ls-remote --tags origin | grep -q "refs/tags/${tag}$"; then
          echo "::notice::Tag ${tag} already exists, skipping creation"
          echo "Tag ${tag} already exists on remote"
          exit 0
        fi
        
        # Delete local tag if it exists (cleanup)
        if git tag -l "${tag}" | grep -q "^${tag}$"; then
          echo "Deleting existing local tag ${tag}"
          git tag -d "${tag}" || true
        fi
        
        # Create tag
        if [[ -n "${TAG_MESSAGE}" ]]; then
          # Create annotated tag with message using temp file to handle multiline
          echo "Creating annotated tag ${tag} with message"
          temp_file=$(mktemp)
          printf "%s" "${TAG_MESSAGE}" > "${temp_file}"
          git tag -a "${tag}" ${target} -F "${temp_file}"
          rm -f "${temp_file}"
        else
          # Create lightweight tag
          echo "Creating lightweight tag ${tag}"
          git tag "${tag}" ${target}
        fi
        
        # Push tag
        echo "Pushing tag ${tag} to origin"
        git push origin "${tag}"
        
        echo "::notice::Successfully created and pushed tag ${tag}"
