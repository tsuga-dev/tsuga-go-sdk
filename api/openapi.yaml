          description: Server error
          headers:
            x-request-id:
              description: "Unique identifier for this API request, useful for debugging\
                \ and support"
              explode: false
              schema:
                type: string
              style: simple
      tags:
      - dashboards
    post:
      description: Create a new dashboard
      operationId: createDashboard
      requestBody:
        content:
          application/json:
            example:
              name: API Performance Overview
              owner: abc-123-def
              graphs:
              - id: 789-abc-def
                name: Request Latency P99
                visualization:
                  type: timeseries
                  source: metrics
                  queries:
                  - aggregate:
                      type: percentile
                      field: duration
                      percentile: 99
                    filter: service:api-gateway
                layout:
                  x: 0
                  "y": 0
                  w: 6
                  h: 4
              filters:
              - key: env
                values:
                - production
              tags:
              - key: team
                value: platform
              timePreset: past-1-hour
            schema:
              $ref: "#/components/schemas/createDashboard_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDashboardResponse"
          description: Successful response
