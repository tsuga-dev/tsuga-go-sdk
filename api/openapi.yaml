openapi: 3.1.0
info:
  contact:
    name: Tsuga
    url: https://tsuga.com
  description: HTTP API used by Tsuga customers
  title: Tsuga Public API
  version: 1.0.0
servers:
- url: https://api.tsuga.com
security:
- bearerAuth: []
tags:
- description: Data aggregation and analytics
  name: aggregation
- description: Visualization of telemetry data with customizable graphs and filters
  name: dashboards
- description: API keys for ingesting telemetry data
  name: ingestion-api-keys
- description: User invitation management
  name: invitations
- description: Log search and log patterns
  name: logs
- description: Metrics search and aggregation
  name: metrics
- description: Monitors for sending alerts based on telemetry data
  name: monitors
- description: Notification rules for alerts
  name: notification-rules
- description: Notification silences for alerts
  name: notification-silences
- description: Data retention rules for telemetry sources
  name: retention-policies
- description: Routes for processing log data
  name: routes
- description: Services inferred from telemetry
  name: services
- description: Tag policies for enforcing tag requirements on Tsuga assets or telemetry
    data
  name: tag-policies
- description: Collection of users for managing ownership and access to resources
  name: teams
- description: Memberships of users in teams
  name: team-memberships
- description: Trace search
  name: traces
- description: User management and authentication
  name: users
