components:
  schemas:
    ClientErrorResponse:
      description: Standard envelope for client (4XX) API errors
      example:
        code: CLUSTER_DB_QUERY_INVALID_CONNECTION_PARAMS
        message: message
        statusCode: 1.4658129805029452
      properties:
        code:
          description: Machine readable error code describing what went wrong
          enum:
          - CLUSTER_DB_QUERY_INVALID_CONNECTION_PARAMS
          - CLUSTER_DB_QUERY_INVALID_CREDENTIALS
          - CLUSTER_DB_QUERY_PERMISSION_DENIED
          - CLUSTER_DB_QUERY_QUERY_SYNTAX_ERROR
          - CLUSTER_DB_QUERY_DATABASE_UNREACHABLE
          - CLUSTER_DB_QUERY_CONNECTION_FAILED
          - CLUSTER_DB_QUERY_QUERY_EXECUTION_FAILED
          - CLUSTER_DB_QUERY_QUERY_TIMEOUT
          - CLUSTER_AGGREGATION_STRUCTURE
          - ABORT_ERROR
          - BAD_REQUEST
          - DUPLICATE_KEY_VIOLATION
          - FOREIGN_KEY_VIOLATION
          - FST_ERR_VALIDATION
          - INVALID_INPUT
          - FORBIDDEN
          - MISSING_PERMISSION
          - PRIVILEGE_ESCALATION
          - ORG_NOT_FOUND_AUTHENTICATION_ERROR
          - RATE_LIMITED
          - RESERVED_TAG_POLICY_ERROR
          - RESOURCE_NOT_FOUND
          - INVALID_INVITATION
          - TAG_POLICY_ALREADY_EXISTS_ERROR
          - TAG_POLICY_VALIDATION_ERROR
          - UNAUTHORIZED
          - URL_NOT_FOUND
          type: string
        message:
          description: Human readable explanation of the error
          type: string
        statusCode:
          description: HTTP status code that was returned
          type: number
      required:
      - message
      - statusCode
    ServerErrorResponse:
      description: Standard envelope for server (5XX) API errors
      example:
        code: INTERNAL_ERROR
        message: message
        statusCode: 5.962133916683182
      properties:
        code:
          description: Machine readable error code describing what went wrong
          enum:
          - INTERNAL_ERROR
          - INVALID_QUERY_TO_CLUSTER
          type: string
        message:
          description: Human readable explanation of the error
          type: string
        statusCode:
          description: HTTP status code that was returned
          type: number
      required:
      - message
      - statusCode
    ClientErrorEnvelope:
      description: Standard envelope wrapping all client (4XX) error responses
      example:
        requestId: requestId
        error:
          code: CLUSTER_DB_QUERY_INVALID_CONNECTION_PARAMS
          message: message
          statusCode: 1.4658129805029452
      properties:
        requestId:
          description: Identifier used to trace the lifecycle of this API request
          type: string
        error:
          $ref: "#/components/schemas/ClientErrorResponse"
      required:
      - error
      - requestId
    ServerErrorEnvelope:
      description: Standard envelope wrapping all server (5XX) error responses
      example:
        requestId: requestId
        error:
          code: INTERNAL_ERROR
          message: message
          statusCode: 5.962133916683182
      properties:
        requestId:
          description: Identifier used to trace the lifecycle of this API request
          type: string
        error:
          $ref: "#/components/schemas/ServerErrorResponse"
      required:
      - error
      - requestId
    ResponseMetadata:
      example:
        pagination:
          pageCount: 6
          totalCount: 0
      properties:
        pagination:
          $ref: "#/components/schemas/ResponseMetadata_pagination"
      required:
      - pagination
    DeleteResponse:
      example:
        success: true
      properties:
        success:
          description: Indicates the resource was deleted successfully
          enum:
          - true
          type: boolean
      required:
      - success
    Dashboard:
      description: Visualization of telemetry data with customizable graphs and filters
      example:
        id: 123-456-abc
        name: API Performance Overview
        owner: abc-123-def
        graphs:
        - id: 789-abc-def
          name: Request Latency P99
          visualization:
            type: timeseries
            source: metrics
            queries:
            - aggregate:
                type: percentile
                field: duration
                percentile: 99
              filter: service:api-gateway
          layout:
            x: 0
            "y": 0
            w: 6
            h: 4
        filters:
        - key: env
          values:
          - production
        tags:
        - key: team
          value: platform
        timePreset: past-1-hour
      properties:
        id:
          description: Identifier of the dashboard
          type: string
        name:
          description: Display name of the dashboard
          type: string
        owner:
          description: Team ID that owns and manages the dashboard
          type: string
        graphs:
          description: Ordered widgets that compose the dashboard
          items:
            $ref: "#/components/schemas/Graph_1"
          type: array
        filters:
          description: Filters applied to every widget on the dashboard
          items:
            $ref: "#/components/schemas/Dashboard_filters_inner"
          type: array
        tags:
          description: List of key/value tags applied to the resource
          items:
            $ref: "#/components/schemas/Tag_1"
          title: Tags
          type: array
        timePreset:
          enum:
          - past-5-minutes
          - past-15-minutes
          - past-30-minutes
          - past-1-hour
          - past-2-hours
          - past-4-hours
          - past-6-hours
          - past-12-hours
          - past-24-hours
          - past-2-days
          - past-3-days
          - past-7-days
          - past-30-days
          - past-3-months
          - current-day
          - current-week
          - current-month
          - current-year
          - previous-day
          - previous-week
          - previous-month
          - previous-3-months
          - previous-year
          type: string
      required:
      - graphs
      - id
      - name
      - owner
    QueryDashboardsResponse:
      example:
        metadata:
          pagination:
            pageCount: 6
            totalCount: 0
        data:
