components:
  schemas:
    AggregateCount:
      example:
        type: count
      properties:
        type:
          description: Counts the total number of records
          enum:
          - count
          type: string
      required:
      - type
      type: object
    AggregateSum:
      properties:
        type:
          description: Sums the values of the selected field
          enum:
          - sum
          type: string
        field:
          description: Attribute containing the values to aggregate
          maxLength: 250
          minLength: 0
          type: string
      required:
      - field
      - type
      type: object
    AggregateAverage:
      properties:
        type:
          description: Calculates the average value of the selected field
          enum:
          - average
          type: string
        field:
          description: Attribute containing the values to aggregate
          maxLength: 250
          minLength: 0
          type: string
      required:
      - field
      - type
      type: object
    AggregateMin:
      properties:
        type:
          description: Finds the smallest value of the field
          enum:
          - min
          type: string
        field:
          description: Attribute containing the values to aggregate
          maxLength: 250
          minLength: 0
          type: string
      required:
      - field
      - type
      type: object
    AggregateMax:
      properties:
        type:
          description: Finds the largest value of the field
          enum:
          - max
          type: string
        field:
          description: Attribute containing the values to aggregate
          maxLength: 250
          minLength: 0
          type: string
      required:
      - field
      - type
      type: object
    AggregateUniqueCount:
      properties:
        type:
          description: Counts the distinct values of the field
          enum:
          - unique-count
          type: string
        field:
          description: Attribute containing the values to aggregate
          maxLength: 250
          minLength: 0
          type: string
      required:
      - field
      - type
      type: object
    AggregatePercentile:
      properties:
        type:
          description: Calculates a percentile of the selected field
          enum:
          - percentile
          type: string
        field:
          description: Attribute containing the values to aggregate
          maxLength: 250
          minLength: 0
          type: string
        percentile:
          type: number
      required:
      - field
      - percentile
      - type
      type: object
    FunctionPerSecond:
      example:
        type: per-second
      properties:
        type:
          description: Normalizes the metric to events per second
          enum:
          - per-second
          type: string
      required:
      - type
      type: object
    FunctionPerMinute:
      properties:
        type:
          description: Normalizes the metric to events per minute
          enum:
          - per-minute
          type: string
      required:
      - type
      type: object
    FunctionPerHour:
      properties:
        type:
          description: Normalizes the metric to events per hour
          enum:
          - per-hour
          type: string
      required:
      - type
      type: object
    FunctionRate:
      properties:
        type:
          description: Calculates the rate of change
          enum:
          - rate
          type: string
      required:
      - type
      type: object
    FunctionRolling:
      properties:
        type:
          description: Computes a rolling window aggregate
          enum:
          - rolling
          type: string
        window:
          description: Duration of the rolling window
          maxLength: 250
          minLength: 1
          type: string
      required:
      - type
      - window
      type: object
    RuleTargetInputSlack:
      properties:
        type:
          enum:
          - slack
          type: string
        channel:
          description: Slack channel ID that receives the notification
          maxLength: 250
          minLength: 0
          type: string
        integrationId:
          description: Slack workspace ID that receives the notification
          maxLength: 250
          minLength: 0
          type: string
      required:
      - channel
      - integrationId
      - type
      type: object
    RuleTargetInputIncidentIo:
      properties:
        type:
          enum:
          - incident-io
          type: string
        integrationId:
          description: Identifier of the incident.io integration to use
          maxLength: 250
          minLength: 0
          type: string
      required:
      - integrationId
      - type
      type: object
    RuleTargetInputPagerDuty:
      properties:
        type:
          enum:
          - pagerduty
          type: string
        integrationId:
          description: Identifier of the PagerDuty integration to use
          maxLength: 250
          minLength: 0
          type: string
      required:
      - integrationId
      - type
      type: object
    RuleTargetInputEmail:
      properties:
        type:
          enum:
          - email
          type: string
        addresses:
          description: Email addresses that will receive the alert
          items:
            format: email
            type: string
          minItems: 1
          type: array
      required:
      - addresses
      - type
      type: object
    RuleTargetInputGrafanaIrm:
      properties:
        type:
          enum:
          - grafana-irm
          type: string
        integrationId:
          description: Identifier of the Grafana IRM integration to use
