- description: Tag policies for enforcing tag requirements on Tsuga assets or telemetry
    data
  name: tag-policies
- description: Collection of users for managing ownership and access to resources
  name: teams
- description: Memberships of users in teams
  name: team-memberships
- description: Trace search
  name: traces
- description: User management and authentication
  name: users
