          description: Server error
          headers:
            x-request-id:
              description: "Unique identifier for this API request, useful for debugging\
                \ and support"
              explode: false
              schema:
                type: string
              style: simple
      tags:
      - dashboards
  /v1/dashboards:
    get:
      description: Retrieve all dashboards
      operationId: listDashboards
      parameters:
      - description: The maximum number of items to return
        explode: true
        in: query
        name: limit
        required: false
        schema:
          maximum: 1000
          minimum: 1
          type: integer
        style: form
      - description: The offset of the first item to return
        explode: true
        in: query
        name: offset
        required: false
        schema:
          minimum: 0
          type: integer
        style: form
      - description: Filter by owner team IDs
        explode: true
        in: query
        name: owners
        required: false
        schema:
          items:
            maxLength: 250
            minLength: 1
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDashboardsResponse"
          description: Successful response
          headers:
            x-request-id:
