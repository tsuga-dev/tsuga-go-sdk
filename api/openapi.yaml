components:
  schemas:
    ClientErrorResponse:
      description: Standard envelope for client (4XX) API errors
      example:
        code: ABORT_ERROR
        message: message
        statusCode: 6.027456183070403
      properties:
        code:
          description: Machine readable error code describing what went wrong
          enum:
          - ABORT_ERROR
          - BAD_REQUEST
          - DUPLICATE_KEY_VIOLATION
          - FOREIGN_KEY_VIOLATION
          - FST_ERR_VALIDATION
          - INVALID_INPUT
          - MISSING_PERMISSION
          - PRIVILEGE_ESCALATION
          - ORG_NOT_FOUND_AUTHENTICATION_ERROR
          - RATE_LIMITED
          - RESERVED_TAG_POLICY_ERROR
          - RESOURCE_NOT_FOUND
          - TAG_POLICY_ALREADY_EXISTS_ERROR
          - TAG_POLICY_VALIDATION_ERROR
          - URL_NOT_FOUND
          type: string
        message:
          description: Human readable explanation of the error
          type: string
        statusCode:
          description: HTTP status code that was returned
          type: number
      required:
      - message
      - statusCode
    ServerErrorResponse:
      description: Standard envelope for server (5XX) API errors
      example:
        code: INTERNAL_ERROR
        message: message
        statusCode: 1.4658129805029452
      properties:
        code:
          description: Machine readable error code describing what went wrong
          enum:
          - INTERNAL_ERROR
          - INVALID_QUERY_TO_CLUSTER
          type: string
        message:
          description: Human readable explanation of the error
          type: string
        statusCode:
          description: HTTP status code that was returned
          type: number
      required:
      - message
      - statusCode
    IngestionApiKey:
      description: API key used to send telemetry data to Tsuga
      example:
        id: 123-456-abc
        name: Production Logs Ingestion
        keyLastCharacters: x7Qm
        owner: abc-123-def
        tags:
        - key: env
          value: production
        teamOverrideFields:
        - service
      properties:
        id:
          type: string
        name:
          type: string
        keyLastCharacters:
          type: string
        owner:
          type: string
        tags:
          description: List of key/value tags applied to the resource
          items:
            $ref: "#/components/schemas/Tag"
          maxItems: 50
          type: array
        teamOverrideFields:
          items:
            type: string
          type: array
      required:
      - id
      - keyLastCharacters
      - name
      - owner
    Dashboard:
      description: Visualization of telemetry data with customizable graphs and filters
      example:
        id: 123-456-abc
        name: API Performance Overview
        owner: abc-123-def
        graphs:
        - id: 789-abc-def
          name: Request Latency P99
          visualization:
            type: timeseries
            source: metrics
            queries:
            - aggregate:
                type: percentile
                field: duration
                percentile: 99
              filter: service:api-gateway
          layout:
            x: 0
            "y": 0
            w: 6
            h: 4
        filters:
        - key: env
          values:
          - production
        tags:
        - key: team
          value: platform
        timePreset: past-1-hour
      properties:
        id:
          description: Identifier of the dashboard
          type: string
        name:
          description: Display name of the dashboard
          type: string
        owner:
          description: Team ID that owns and manages the dashboard
          type: string
        graphs:
          description: Ordered widgets that compose the dashboard
          items:
            $ref: "#/components/schemas/Graph"
          type: array
        filters:
          description: Filters applied to every widget on the dashboard
          items:
            $ref: "#/components/schemas/createDashboard_request_filters_inner"
          maxItems: 10
          type: array
        tags:
          description: List of key/value tags applied to the resource
          items:
            $ref: "#/components/schemas/Tag"
          maxItems: 50
          type: array
        timePreset:
          enum:
          - past-5-minutes
          - past-15-minutes
          - past-30-minutes
          - past-1-hour
          - past-2-hours
          - past-4-hours
          - past-6-hours
          - past-12-hours
          - past-24-hours
          - past-2-days
          - past-3-days
          - past-7-days
          - past-30-days
          - past-3-months
          - current-day
          - current-week
          - current-month
          - current-year
          - previous-day
          - previous-week
          - previous-month
          - previous-3-months
          - previous-year
          type: string
      required:
      - graphs
      - id
      - name
      - owner
    Monitor:
      description: Monitor allowing to send alerts based on telemetry data
      example:
        id: 123-456-abc
        name: High Error Rate Alert
        message: Error rate exceeded threshold. Check the API gateway logs.
        tags:
        - key: severity
          value: critical
        configuration:
          type: log
          timeframe: 5
          groupByFields: []
          queries:
          - aggregate:
              type: count
            filter: level:ERROR service:api-gateway
          condition:
            formula: q1
            operator: greater_than
            threshold: 100
          noDataBehavior: resolve
        priority: 1
        owner: abc-123-def
        dashboardId: 789-abc-def
        permissions: all
      properties:
        id:
          description: Identifier of the monitor
          type: string
        name:
          description: Display name of the monitor
          type: string
        owner:
          description: Team ID that owns and manages the monitor
          type: string
        message:
          description: Message to be displayed if a notification is triggered
          type: string
        tags:
          description: List of key/value tags applied to the resource
          items:
            $ref: "#/components/schemas/Tag"
          maxItems: 50
          type: array
        configuration:
          $ref: "#/components/schemas/createMonitor_request_configuration"
        priority:
          description: Priority of the monitor
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
          type: number
        permissions:
          description: This controls which data the monitor can see
          enum:
          - all
          - owning-team-and-public
          - owning-team-only
          type: string
        dashboardId:
          description: Identifier of a dashboard related to the monitor
          type: string
      required:
      - configuration
      - id
      - name
      - owner
      - permissions
      - priority
    Rule:
      description: Rules to trigger notifications to targets based on alert events
      example:
        id: 123-456-abc
        name: Critical Alerts
        teamsFilter:
          type: all-teams
        prioritiesFilter:
        - 1
        - 2
        transitionTypesFilter:
        - triggered
        - resolved
        owner: abc-123-def
        isActive: true
        tags:
        - key: channel
          value: alerts
        targets:
        - id: 789-abc-def
          config:
            type: email
            addresses:
            - oncall@example.com
      properties:
        id:
          description: Identifier of the notification rule
          type: string
        name:
          description: Display name of the notification rule
          type: string
        teamsFilter:
          $ref: "#/components/schemas/Rule_teamsFilter"
        prioritiesFilter:
          description: Priorities that narrow down the alerts that can trigger a notification
          items:
            enum:
            - 1
            - 2
            - 3
            - 4
            - 5
            type: number
          type: array
        transitionTypesFilter:
          description: Alert state transitions that can trigger a notification
          items:
            enum:
            - triggered
            - resolved
            - no-data
            type: string
          type: array
        owner:
          description: Team ID that owns and manages the rule
          type: string
        isActive:
          type: boolean
        tags:
          description: List of key/value tags applied to the resource
          items:
            $ref: "#/components/schemas/Tag"
          maxItems: 50
          type: array
        targets:
          description: Notification targets that can receive notifications when the
            rule matches
          items:
            $ref: "#/components/schemas/Rule_targets_inner"
          type: array
      required:
      - id
      - isActive
      - name
      - owner
      - prioritiesFilter
      - targets
      - teamsFilter
      - transitionTypesFilter
    NotificationSilence:
      description: Silences to suppress notifications based on schedules and filters
