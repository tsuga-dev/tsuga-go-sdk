    post:
      description: Create a new monitor
      operationId: createMonitor
      requestBody:
        content:
          application/json:
            examples:
              example1:
                value:
                  name: High Error Rate Alert
                  message: Error rate exceeded threshold. Check the API gateway logs.
                  tags:
                  - key: severity
                    value: critical
                  configuration:
                    type: log
                    timeframe: 5
                    groupByFields: []
                    queries:
                    - aggregate:
                        type: count
                      filter: level:ERROR service:api-gateway
                    conditions:
                    - formula: q1
                      operator: greater_than
                      threshold: 100
                    noDataBehavior: resolve
                  priority: 1
                  owner: abc-123-def
                  dashboardId: 789-abc-def
                  permissions: all
              example2:
                value:
                  name: New Error Pattern Detector
                  message: A new error pattern was detected in the logs.
                  tags:
                  - key: team
                    value: platform
                  configuration:
                    type: log-error-pattern
                    aggregationAlertLogic: each
                    noDataBehavior: keep_last_status
                    filter:
                      teamIds:
                      - abc-123-def
                      env: production
                      service: api-gateway
                  priority: 2
                  owner: abc-123-def
                  dashboardId: 789-abc-def
                  permissions: all
            schema:
