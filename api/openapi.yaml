openapi: 3.1.0
info:
  contact:
    name: Tsuga
    url: https://tsuga.com
  description: HTTP API used by Tsuga customers
  title: Tsuga Public API
  version: 1.0.0
servers:
- url: https://api.tsuga.com
security:
- bearerAuth: []
tags:
- description: Data aggregation and analytics
  name: aggregation
- description: Cluster management
  name: clusters
- description: Custom tag keys for tracking usage across telemetry data
  name: custom-usage-tags
- description: Visualization of telemetry data with customizable graphs and filters
  name: dashboards
- description: API keys for ingesting telemetry data
  name: ingestion-api-keys
- description: User invitation management
  name: invitations
- description: Log search and log patterns
  name: logs
- description: Metrics search and aggregation
  name: metrics
- description: Monitors for sending alerts based on telemetry data
  name: monitors
- description: Notification rules for alerts
  name: notification-rules
- description: Notification silences for alerts
  name: notification-silences
- description: Data retention rules for telemetry sources
  name: retention-policies
- description: Routes for processing log data
  name: routes
- description: Services inferred from telemetry
  name: services
- description: Tag policies for enforcing tag requirements on Tsuga assets or telemetry
    data
  name: tag-policies
- description: Collection of users for managing ownership and access to resources
  name: teams
- description: Memberships of users in teams
  name: team-memberships
- description: Trace search
  name: traces
- description: User management and authentication
  name: users
paths:
  /v1/dashboards/query:
    post:
      description: "Query dashboards with filters, sorting, and pagination"
      operationId: queryDashboards
      requestBody:
        content:
          application/json:
            example:
              filters:
                owners:
                  values:
                  - team-123-abc
                searchQuery:
                  value: API
                tags:
                  values:
                  - key: service
                    value: api-gateway
              sort:
                by: name
                direction: asc
              limit: 10
              offset: 0
            schema:
              $ref: "#/components/schemas/queryDashboards_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryDashboardsResponse"
          description: Successful response
          headers:
            x-request-id:
              description: "Unique identifier for this API request, useful for debugging\
                \ and support"
              explode: false
              schema:
                type: string
              style: simple
        "4XX":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientErrorEnvelope"
          description: Client error
          headers:
            x-request-id:
              description: "Unique identifier for this API request, useful for debugging\
                \ and support"
              explode: false
              schema:
                type: string
              style: simple
        "5XX":
