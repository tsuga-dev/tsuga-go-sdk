      required:
      - integrationId
      - type
      type: object
    RuleTargetConfigSlack:
      example:
        integrationName: integrationName
        channel: channel
        integrationId: integrationId
        type: slack
      properties:
        type:
          enum:
          - slack
          type: string
        channel:
          description: Slack channel ID that receives the notification
          type: string
        integrationId:
          description: Slack workspace ID that receives the notification
          type: string
        integrationName:
