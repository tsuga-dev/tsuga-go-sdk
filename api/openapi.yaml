components:
  schemas:
    ClientErrorResponse:
      description: Standard envelope for client (4XX) API errors
      example:
        code: ABORT_ERROR
        message: message
        statusCode: 0.8008281904610115
      properties:
        code:
          description: Machine readable error code describing what went wrong
          enum:
          - ABORT_ERROR
          - BAD_REQUEST
          - DUPLICATE_KEY_VIOLATION
          - FOREIGN_KEY_VIOLATION
          - FST_ERR_VALIDATION
          - INVALID_INPUT
          - MISSING_PERMISSION
          - PRIVILEGE_ESCALATION
          - ORG_NOT_FOUND_AUTHENTICATION_ERROR
          - RATE_LIMITED
          - RESERVED_TAG_POLICY_ERROR
          - RESOURCE_NOT_FOUND
          - INVALID_INVITATION
          - TAG_POLICY_ALREADY_EXISTS_ERROR
          - TAG_POLICY_VALIDATION_ERROR
          - URL_NOT_FOUND
          type: string
        message:
          description: Human readable explanation of the error
          type: string
        statusCode:
          description: HTTP status code that was returned
          type: number
      required:
      - message
      - statusCode
    ServerErrorResponse:
      description: Standard envelope for server (5XX) API errors
      example:
        code: INTERNAL_ERROR
        message: message
        statusCode: 6.027456183070403
      properties:
        code:
          description: Machine readable error code describing what went wrong
          enum:
          - INTERNAL_ERROR
          - INVALID_QUERY_TO_CLUSTER
          type: string
        message:
          description: Human readable explanation of the error
          type: string
        statusCode:
          description: HTTP status code that was returned
          type: number
      required:
      - message
      - statusCode
    ClientErrorEnvelope:
      description: Standard envelope wrapping all client (4XX) error responses
      example:
        requestId: requestId
        error:
          code: ABORT_ERROR
          message: message
          statusCode: 0.8008281904610115
      properties:
        requestId:
          description: Identifier used to trace the lifecycle of this API request
          type: string
        error:
          $ref: "#/components/schemas/ClientErrorResponse"
      required:
      - error
      - requestId
    ServerErrorEnvelope:
      description: Standard envelope wrapping all server (5XX) error responses
      example:
        requestId: requestId
        error:
          code: INTERNAL_ERROR
          message: message
          statusCode: 6.027456183070403
      properties:
        requestId:
