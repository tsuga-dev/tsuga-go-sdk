      - integrationName
      - type
      type: object
    ProcessorParamsCreatorFormatString:
      properties:
        targetAttribute:
          description: Attribute that will receive the formatted value
          maxLength: 250
          minLength: 0
          type: string
        formatString:
          description: Template string used to build the target attribute value
          maxLength: 50000
          minLength: 0
          type: string
        overrideTarget:
          description: Set to true to overwrite an existing target attribute value
            (defaults to true)
          type: boolean
        subtype:
          enum:
          - format-string
          type: string
        replaceMissingByEmpty:
          type: boolean
      required:
      - formatString
      - subtype
      - targetAttribute
      type: object
    ProcessorParamsCreatorMathFormula:
      properties:
        targetAttribute:
          description: Attribute that will receive the computed value
          maxLength: 250
          minLength: 0
          type: string
        formula:
          description: Mathematical formula evaluated to populate the target attribute
          maxLength: 50000
          minLength: 0
          type: string
        overrideTarget:
          description: Set to true to overwrite an existing target attribute value
            (defaults to true)
          type: boolean
        subtype:
          enum:
          - math-formula
          type: string
        replaceMissingBy0:
          type: boolean
      required:
      - formula
      - subtype
      - targetAttribute
      type: object
    ProcessorParamsMapperMapAttributes:
      example:
        subtype: map-attributes
        attributes:
        - keepOrigin: true
          originAttribute: originAttribute
          targetAttribute: targetAttribute
          overrideTarget: true
